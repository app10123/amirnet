<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  /* 3D card flip */
  .card-scene { perspective: 1400px; }
  .card-body { transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(0.4,0,0.2,1); }
  .card-body.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .card-back { transform: rotateY(180deg); }
  /* Splash */
  #splash { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(170deg, #0a0e1a 0%, #0d1d4b 100%); transition: opacity 0.55s ease; }
  /* Scrollbar hidden */
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { -webkit-tap-highlight-color: transparent; }
  /* Screen animation */
  .screen-in { animation: screenIn 0.22s ease-out; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  /* Confetti */
  .confetti-p { position: fixed; width: 8px; height: 8px; border-radius: 2px; animation: cfFall 2.2s ease-in forwards; pointer-events: none; z-index: 9998; top: -10px; }
  @keyframes cfFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  /* Swipe card */
  .swipe-card { transition: transform 0.08s linear, opacity 0.08s linear; }
  /* Quiz option states */
  .quiz-opt { cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .quiz-opt:active { transform: scale(0.98); }
  .quiz-opt.correct { background: oklch(0.55 0.13 150) !important; color: white !important; border-color: transparent !important; }
  .quiz-opt.wrong { background: oklch(0.58 0.16 20) !important; color: white !important; border-color: transparent !important; }
</style>

        function renderSCList() {
            let listView = document.getElementById('sc-list-view');
            if (!listView) return;
            let total = sentenceQuestions.length;
            let correctCount = Object.values(sentenceProgress).filter(p => p.correct).length;
            let wrongCount = Object.values(sentenceProgress).filter(p => p.answered && !p.correct).length;
            let unseenCount = total - correctCount - wrongCount;
            let pct = Math.round((correctCount / total) * 100);

            let gridHtml = sentenceQuestions.map((q, i) => {
                let prog = sentenceProgress[i];
                let cls = 'sc-cell';
                let label = i + 1;
                if (prog && prog.answered) {
                    cls += prog.correct ? ' sc-correct' : ' sc-wrong';
                    label = prog.correct
                        ? `<svg class="sc-check-svg" viewBox="0 0 16 16"><polyline class="sc-check-path" points="2,9 6,13 14,4"/></svg>`
                        : `<svg class="sc-check-svg" viewBox="0 0 16 16"><line class="sc-x-path" x1="3" y1="3" x2="13" y2="13"/><line class="sc-x-path" x1="13" y1="3" x2="3" y2="13"/></svg>`;
                }
                return `<button class="${cls}" onclick="showSCQuestion(${i})">${label}</button>`;
            }).join('');

            listView.innerHTML = `

        // ===== Text-to-Speech =====
        function getTTSRate() { return parseFloat(localStorage.getItem('ttsRate') || '0.7'); }
        function setTTSRate(rate) {
            localStorage.setItem('ttsRate', rate);
            document.querySelectorAll('#tts-rate-btns .timer-preset-btn').forEach(btn => {
                btn.classList.toggle('active', parseFloat(btn.getAttribute('data-rate')) === rate);
            });
        }

        const _TTS_ICON = `<svg viewBox="0 0 20 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;pointer-events:none;flex-shrink:0;"><path d="M3 6H1v6h2l4 3V3L3 6z" fill="currentColor" stroke="none"/><path d="M13 3c2 1.7 3.2 4.2 3.2 6s-1.2 4.3-3.2 6"/><path d="M10.5 6c1 0.9 1.6 2.2 1.6 3s-0.6 2.1-1.6 3"/></svg>`;
        const _TTS_WAVES = `<span style="display:inline-flex;align-items:center;gap:2px;height:18px;pointer-events:none;"><span class="tts-wave-bar" style="height:8px;"></span><span class="tts-wave-bar" style="height:14px;"></span><span class="tts-wave-bar" style="height:10px;"></span><span class="tts-wave-bar" style="height:14px;"></span></span>`;
        function _ttsSetIcon(btn, speaking, withLabel) {
            if (!btn) return;
            if (withLabel) {
                btn.innerHTML = speaking ? (_TTS_WAVES + ' ' + withLabel) : (_TTS_ICON + ' ' + withLabel);
            } else {
                btn.innerHTML = speaking ? _TTS_WAVES : _TTS_ICON;
            }
        }
        let _ttsBtn = null;
        let _ttsBtnLabel = null;
        function ttsStop() {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            if (_ttsBtn) { _ttsSetIcon(_ttsBtn, false, _ttsBtnLabel); _ttsBtn.classList.remove('speaking'); _ttsBtn = null; _ttsBtnLabel = null; }
        }
        function ttsSpeak(texts, btnEl, rowLabel) {
            if (window.speechSynthesis.speaking) {
                let prevBtn = _ttsBtn;
                ttsStop();
                if (prevBtn === btnEl) return;
            }
            _ttsBtn = btnEl;
            _ttsBtnLabel = rowLabel || null;
            if (btnEl) { _ttsSetIcon(btnEl, true, rowLabel); btnEl.classList.add('speaking'); }
            const run = (idx) => {
                if (idx >= texts.length) { _ttsSetIcon(btnEl, false, rowLabel); if (btnEl) btnEl.classList.remove('speaking'); _ttsBtn = null; _ttsBtnLabel = null; return; }
                let utt = new SpeechSynthesisUtterance(texts[idx]);
                utt.lang = 'en-US';
                utt.rate = getTTSRate();
                utt.onend = () => run(idx + 1);
                utt.onerror = () => { _ttsSetIcon(btnEl, false, rowLabel); if (btnEl) btnEl.classList.remove('speaking'); _ttsBtn = null; _ttsBtnLabel = null; };
                window.speechSynthesis.speak(utt);
            };
            run(0);
        }
        function ttsSC(btnEl)      { let q = sentenceQuestions[currentSentenceIndex];    ttsSpeak([q.q.replace(/_+/g, 'blank')], btnEl); }
        function ttsSCOpts(btnEl)  { let q = sentenceQuestions[currentSentenceIndex];    ttsSpeak(q.options, btnEl, 'הקרא תשובות'); }
        function ttsRS(btnEl)      { let q = restatementQuestions[currentRestatementIndex]; ttsSpeak([q.q], btnEl); }
        function ttsRSOpts(btnEl)  { let q = restatementQuestions[currentRestatementIndex]; ttsSpeak(q.options, btnEl, 'הקרא תשובות'); }
        function ttsPassage(btnEl) {
            let el = document.getElementById('rc-content');
            let raw = el.innerText.trim();
            let sentences = raw.split(/(?<=[.?!])\s+/).map(s => s.trim()).filter(s => s.length > 0);
            if (sentences.length === 0) sentences = [raw];
            ttsSpeak(sentences, btnEl, 'הקרא את הקטע');
        }
        function ttsRCQ(idx, btnEl){ let t = allTexts.find(x => x.id === currentTextId); ttsSpeak([t.questions[idx].q], btnEl); }

        function renderSentenceQuestion() {
            let container = document.getElementById('sc-container');
            let i = currentSentenceIndex;
            let q = sentenceQuestions[i];
            let total = sentenceQuestions.length;
            let prog = sentenceProgress[i];
            let isAnswered = prog && prog.answered;

            let optionsHtml = q.options.map((opt, optIndex) => {
                let cls = 'q-opt-btn';
                let disabled = '';
                if (isAnswered) {
                    disabled = 'disabled';
                    if (optIndex === q.correct) cls += ' correct';
                    else if (prog.selectedOpt === optIndex) cls += ' wrong';
                }
                let click = isAnswered ? '' : `onclick="answerSC(${i}, ${optIndex}, ${q.correct})"`;
                return `<button class="${cls}" ${disabled} ${click}>${opt}</button>`;
            }).join('');

            let expStyle = isAnswered ? 'display:block' : 'display:none';
            let nextLabel = i < total - 1 ? 'השאלה הבאה ›' : '← סיום — חזור לרשימה';

            container.innerHTML = `
                <div class="sc-nav-row">
                    <button class="sc-nav-btn" onclick="showSCQuestion(${i - 1})" ${i === 0 ? 'disabled' : ''}>
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"></polyline></svg>

                renderChart();

            localStorage.setItem('sentenceProgress', JSON.stringify(sentenceProgress));

                btns[selectedOpt].classList.add('correct');

  }

}
function fireConfetti() {

    { id:'test', label:'מבחן', icon:'target' },

  ];
  return <div style={{ position:'fixed', bottom:0, left:0, right:0, height:72, background: t.dark ? 'rgba(22,22,28,0.92)' : 'rgba(255,255,255,0.92)', backdropFilter:'blur(20px) saturate(180%)', WebkitBackdropFilter:'blur(20px) saturate(180%)', borderTop:`0.5px solid ${t.dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.07)'}`, display:'flex', alignItems:'center', justifyContent:'space-around', zIndex:100, fontFamily:t.fontHe, paddingBottom:'env(safe-area-inset-bottom)' }}>
    {tabs.map(tab => {
      const on = tab.id === active;
      return <div key={tab.id} onClick={() => onNav(tab.id)} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, color: on ? t.accent : t.c.muted, cursor:'pointer', padding:'4px 16px' }}>

}

// ─── Home Screen ──────────────────────────────────────────────
function HomeScreen({ t, allWords, progress, stats, streak, onStartFlash, onNavigate }) {
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 5 ? 'לילה טוב' : hour < 12 ? 'בוקר טוב' : hour < 17 ? 'צהריים טובים' : 'ערב טוב';
  const pct = stats.total > 0 ? Math.round((stats.known / stats.total) * 100) : 0;

  const dueForReview = useMemo(() => {
    const n = Date.now();
    return allWords.filter(w => {
      const p = progress[w.en];
      return p && p.status === 'known' && (p.nextReview || 0) <= n;
    });
  }, [allWords, progress]);

  const learningWords = useMemo(() => allWords.filter(w => progress[w.en]?.status === 'learning'), [allWords, progress]);
  const unseenWords = useMemo(() => allWords.filter(w => !progress[w.en] || progress[w.en].status === 'unseen'), [allWords, progress]);

  const startStudy = () => {
    const lrn = shuffle(learningWords);
    const unsn = shuffle(unseenWords);
    const due = shuffle(dueForReview);
    const list = [...lrn, ...due, ...unsn].slice(0, 40);
    onStartFlash(list.length > 0 ? list : shuffle(allWords).slice(0, 20));
  };

  const lastSession = useMemo(() => {
    try { return JSON.parse(localStorage.getItem('lastSession') || 'null'); } catch { return null; }
  }, []);

  return <div className="screen-in" style={{ padding:`16px ${t.pad}px 0`, fontFamily:t.fontHe }}>
    {/* Header */}
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 4px 16px' }}>
      <div>
        <div style={{ fontSize:13, color:t.c.muted, marginBottom:4 }}>
          {greeting} · {now.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' })}
        </div>
        <div style={{ fontSize:24, fontWeight:700, letterSpacing:'-0.01em', color:t.c.ink, lineHeight:1.2 }}>
          שלום, אמיר.<br/>
          <span style={{ color:t.c.ink2, fontWeight:600, fontSize:20 }}>בוא נמשיך ללמוד.</span>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <Icon name="flame" size={16} color={t.c.statusAmber} stroke={1.8}/>
        <span style={{ fontSize:15, fontWeight:700, color:t.c.ink2, fontFamily:t.fontEn }}>{streak}</span>
      </div>
    </div>

    {/* Progress card */}
    <Card t={t} pad={18} style={{ marginBottom:18 }}>
      <div style={{ display:'flex', alignItems:'center', gap:18 }}>
        <Ring t={t} value={pct} size={118} stroke={9} label={`${pct}%`} sub="התקדמות"/>
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:14 }}>
          <StatRow t={t} color={t.c.statusGreen} label="יודע" value={stats.known}/>
          <StatRow t={t} color={t.accent} label="ללמידה" value={stats.learning}/>
          <StatRow t={t} color={t.c.muted} label="טרם מוין" value={stats.unseen} faint/>
        </div>
      </div>
      <div style={{ height:0.5, background:t.c.line, margin:'16px -4px 12px', opacity:0.7 }}/>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:13, color:t.c.muted }}>סה״כ {stats.total.toLocaleString()} מילים · Kidum</span>
        {learningWords.length > 0 && <span style={{ fontSize:12, color:t.accent, fontWeight:600 }}>{learningWords.length} ללמידה</span>}
      </div>
    </Card>

    {/* Start session */}
    <div style={{ marginBottom:18 }}>
      <div style={{ fontSize:11.5, fontWeight:700, letterSpacing:'0.12em', color:t.c.muted, textTransform:'uppercase', padding:'0 4px 10px' }}>מה ללמוד היום</div>
      <Card t={t} onAccent pad={0} style={{ overflow:'hidden', position:'relative' }}>
        <div style={{ position:'absolute', top:-30, left:-30, opacity:0.12 }}>
          <AmirnetMark size={140} color="#fff" stroke={1}/>
        </div>
        <div style={{ position:'relative', zIndex:1, padding:18 }}>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.14em', opacity:0.85, marginBottom:8 }}>שינון ממוקד · Spaced Repetition</div>
          <div style={{ fontSize:20, fontWeight:700, lineHeight:1.25, marginBottom:4 }}>
            {learningWords.length > 0 ? `${learningWords.length} מילים ללמידה` : unseenWords.length > 0 ? `${Math.min(20,unseenWords.length)} מילים חדשות` : 'חזרה על כל המילים'}
          </div>
          <div style={{ fontSize:13, opacity:0.8, marginBottom:18 }}>
            {dueForReview.length > 0 && `+ ${dueForReview.length} לחזרה מתוזמנת`}
          </div>
          <div onClick={startStudy} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, height:50, borderRadius:9999, background:'#fff', color:t.accentInk, fontWeight:700, fontSize:16, cursor:'pointer', userSelect:'none' }}>
            התחל לימוד
            <Icon name="chevron-left" size={16} color={t.accentInk} stroke={2.2}/>
          </div>
        </div>
      </Card>
    </div>

    {/* Quick actions */}
    <div style={{ marginBottom:18 }}>
      <div style={{ fontSize:11.5, fontWeight:700, letterSpacing:'0.12em', color:t.c.muted, textTransform:'uppercase', padding:'0 4px 10px' }}>פעולות מהירות</div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <QuickAction t={t} icon="cards" label="כרטיסיות" sub={`${Math.min(20,unseenWords.length)} מילים חדשות`} onClick={() => onStartFlash(shuffle(unseenWords).slice(0, 20))}/>
        <QuickAction t={t} icon="refresh" label="חזרה" sub={dueForReview.length > 0 ? `${dueForReview.length} מחכות לחזרה` : 'אין כרגע'} onClick={() => dueForReview.length && onStartFlash(shuffle(dueForReview))}/>
        <QuickAction t={t} icon="star" label="קשות" sub={`${allWords.filter(w => (progress[w.en]?.fails||0)>=2).length} מילים`} onClick={() => onStartFlash(shuffle(allWords.filter(w => (progress[w.en]?.fails||0)>=2)).slice(0,30))}/>
        <QuickAction t={t} icon="list" label="ניסוח מחדש" sub="שאלות מבחן" onClick={() => onNavigate('test')}/>
      </div>
    </div>

    {/* Adaptive test CTA */}
    <div style={{ marginBottom:24 }}>
      <div style={{ fontSize:11.5, fontWeight:700, letterSpacing:'0.12em', color:t.c.muted, textTransform:'uppercase', padding:'0 4px 10px' }}>סימולציית מבחן</div>
      <Card t={t} style={{ border:`1px solid ${t.c.line}`, cursor:'pointer' }} onClick={() => onNavigate('test')}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ width:44, height:44, borderRadius:14, background:t.accentSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <Icon name="target" size={22} color={t.accent} stroke={1.8}/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:16, fontWeight:700, color:t.c.ink, marginBottom:2 }}>מבחן פסיכומטרי אנגלית</div>
            <div style={{ fontSize:13, color:t.c.muted }}>השלמת משפטים · ניסוח מחדש</div>
          </div>
          <Icon name="chevron-left" size={18} color={t.c.muted} stroke={1.8}/>
        </div>
      </Card>
    </div>
  </div>;
}

function StatRow({ t, color, label, value, faint }) {
  return <div style={{ display:'flex', alignItems:'center', gap:10 }}>
    <StatusDot color={color}/>
    <div style={{ fontSize:13.5, color: faint ? t.c.muted : t.c.ink2, fontWeight:500 }}>{label}</div>
    <div style={{ flex:1 }}/>
    <div style={{ fontFamily:t.fontEn, fontWeight:700, fontSize:15, color:t.c.ink }}>{value}</div>
  </div>;
}

function QuickAction({ t, icon, label, sub, onClick }) {
  return <div onClick={onClick} style={{ background:t.c.surface, borderRadius:t.rCard, padding:14, display:'flex', flexDirection:'column', gap:10, height:92, cursor:'pointer', border: t.dark ? `0.5px solid ${t.c.line}` : 'none', boxShadow: t.dark ? 'none' : '0 1px 0 rgba(20,20,40,0.025), 0 6px 22px -12px rgba(20,20,40,0.08)' }}>
    <Icon name={icon} size={20} color={t.accent} stroke={1.8}/>
    <div style={{ marginTop:'auto' }}>
      <div style={{ fontSize:14, fontWeight:700, color:t.c.ink, lineHeight:1.1 }}>{label}</div>
      <div style={{ fontSize:11.5, color:t.c.muted, marginTop:2 }}>{sub}</div>
    </div>
  </div>;
}

// ─── Flashcard Screen ─────────────────────────────────────────
function FlashcardScreen({ t, list, progress, streak: initStreak, aiData, saveProgress, onBack }) {
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [localStreak, setLocalStreak] = useState(initStreak);
  const [sessionStats, setSessionStats] = useState({ reviewed:0, known:0, learning:0 });
  const [done, setDone] = useState(false);
  const [showAssoc, setShowAssoc] = useState(false);
  const touchRef = useRef(null);
  const cardRef = useRef(null);

  const word = list[index];
  const wordProgress = word ? (progress[word.en] || { status:'unseen', fails:0, reviewLevel:0, nextReview:0 }) : null;
  const ai = word ? (aiData[word.en] || aiData[word.en?.toLowerCase()] || aiData[word.en ? word.en.charAt(0).toUpperCase()+word.en.slice(1) : ''] || {}) : {};

  const mark = useCallback((status) => {
    if (!word) return;
    const newProgress = { ...progress };
    if (!newProgress[word.en]) newProgress[word.en] = { status:'unseen', fails:0, reviewLevel:0, nextReview:0 };
    const now = Date.now();
    const dayMs = 86400000;
    let newStreak = localStreak;

    if (status === 'known') {
      newStreak++;
      if (newStreak > 0 && newStreak % 10 === 0) fireConfetti();
      const todayStr = new Date().toISOString().split('T')[0];
      if (!newProgress[word.en].learnedDate) newProgress[word.en].learnedDate = todayStr;
      const level = newProgress[word.en].reviewLevel || 0;
      const daysMap = [1, 3, 7, 14];
      newProgress[word.en].nextReview = now + (daysMap[Math.min(level,3)] * dayMs);
      newProgress[word.en].reviewLevel = level + 1;
      newProgress[word.en].inStack = false;
      // daily stats
      try {
        const ds = JSON.parse(localStorage.getItem('dailyStats') || '{}');
        ds[todayStr] = (ds[todayStr] || 0) + 1;
        localStorage.setItem('dailyStats', JSON.stringify(ds));
      } catch {}
    } else if (status === 'learning') {
      newStreak = 0;
      newProgress[word.en].fails = (newProgress[word.en].fails || 0) + 1;
      newProgress[word.en].reviewLevel = 0;
      newProgress[word.en].nextReview = 0;
    }
    newProgress[word.en].status = status;

    // Session tracking
    try {
      const today = new Date().toDateString();
      const raw = JSON.parse(localStorage.getItem('lastSession') || '{}');
      const sess = raw.date && new Date(raw.date).toDateString() === today ? raw : { date:new Date().toISOString(), reviewed:0, markedKnown:0 };
      sess.reviewed = (sess.reviewed||0) + 1;
      if (status === 'known') sess.markedKnown = (sess.markedKnown||0) + 1;
      localStorage.setItem('lastSession', JSON.stringify(sess));
    } catch {}

    setLocalStreak(newStreak);
    saveProgress(newProgress, newStreak);
    setSessionStats(s => ({ reviewed:s.reviewed+1, known: s.known+(status==='known'?1:0), learning: s.learning+(status==='learning'?1:0) }));
    setFlipped(false);
    setShowAssoc(false);

    if (index < list.length - 1) setIndex(index + 1);
    else setDone(true);
  }, [word, index, list.length, localStreak, progress, saveProgress]);

  const skip = useCallback(() => {
    setFlipped(false);
    setShowAssoc(false);
    if (index < list.length - 1) setIndex(index + 1);
    else setDone(true);
  }, [index, list.length]);

  // Touch / swipe support
  const onTouchStart = (e) => { touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
  const onTouchEnd = (e) => {
    if (!touchRef.current || !flipped) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = Math.abs(e.changedTouches[0].clientY - touchRef.current.y);
    if (Math.abs(dx) > 55 && dy < 60) { mark(dx > 0 ? 'known' : 'learning'); }
    touchRef.current = null;
  };

  if (done || list.length === 0) {
    return <SessionDone t={t} stats={sessionStats} streak={localStreak} onBack={onBack} onRestart={() => { setIndex(0); setDone(false); setSessionStats({reviewed:0,known:0,learning:0}); setFlipped(false); }}/>;
  }

  const statusColor = { known: t.c.statusGreen, learning: t.c.statusRose, unseen: t.c.muted };
  const statusLabel = { known: 'יודע', learning: 'ללמידה', unseen: 'חדשה' };
  const wStatus = wordProgress?.status || 'unseen';

  return <div className="screen-in" style={{ height:'100%', display:'flex', flexDirection:'column', fontFamily:t.fontHe }}>
    {/* Top bar */}
    <div style={{ padding:`12px ${t.pad}px 8px`, display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
      <div onClick={onBack} style={{ width:36, height:36, borderRadius:18, background: t.dark ? 'rgba(255,255,255,0.08)' : 'rgba(20,20,30,0.06)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
        <Icon name="chevron-right" size={18} color={t.c.ink2} stroke={2}/>
      </div>
      <div style={{ flex:1 }}>
        <ProgressBar t={t} value={(index/list.length)*100} height={4}/>
      </div>
      <div style={{ fontSize:13, fontWeight:600, color:t.c.muted, fontFamily:t.fontEn, minWidth:38, textAlign:'left' }}>{index+1}/{list.length}</div>
    </div>

    {/* Streak badge */}
    {localStreak > 0 && <div style={{ display:'flex', alignItems:'center', gap:5, padding:'0 18px 6px', flexShrink:0 }}>
      <Icon name="flame" size={13} color={t.c.statusAmber} stroke={1.8}/>
      <span style={{ fontSize:12, fontWeight:700, color:t.c.statusAmber, fontFamily:t.fontEn }}>{localStreak}</span>
    </div>}

    {/* Card area */}
    <div ref={cardRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:`4px ${t.pad}px`, minHeight:0 }}>
      <div onClick={() => !flipped && setFlipped(true)} className="card-scene swipe-card" style={{ width:'100%', maxWidth:480, height:'100%', maxHeight:420, cursor: flipped ? 'default' : 'pointer', position:'relative' }}>
        <div className={`card-body${flipped ? ' flipped' : ''}`} style={{ width:'100%', height:'100%' }}>
          {/* Front */}
          <div className="card-face" style={{ background:t.c.surface, borderRadius:22, border:`1px solid ${t.c.line}`, boxShadow: t.dark ? 'none' : '0 2px 0 rgba(20,20,40,0.04), 0 12px 40px -10px rgba(20,20,40,0.14)', display:'flex', flexDirection:'column' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', padding:'18px 18px 0' }}>
              <div style={{ display:'flex', gap:6 }}>
                {word.unit && <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.12em', color:t.accent, padding:'4px 8px', borderRadius:999, background:t.accentSoft }}>{word.unit?.toUpperCase()}</span>}
                {word.level && <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.12em', color:t.c.muted, padding:'4px 8px', borderRadius:999, background: t.dark ? 'rgba(255,255,255,0.07)' : 'rgba(20,20,30,0.05)' }}>{word.level?.toUpperCase()}</span>}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                <StatusDot color={statusColor[wStatus]} size={7}/>
                <span style={{ fontSize:11, color:t.c.muted, fontWeight:600 }}>{statusLabel[wStatus]}</span>
              </div>
            </div>
            <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px 24px 24px', gap:10 }}>
              <div style={{ fontFamily:t.fontDisplay, fontSize: word.en?.length > 16 ? 38 : word.en?.length > 12 ? 46 : 56, fontWeight:400, color:t.c.ink, letterSpacing:'-0.015em', lineHeight:1.05, direction:'ltr', textAlign:'center' }}>
                {word.en}
              </div>
              {word.source && word.source !== 'Kidum' && <div style={{ fontSize:11, color:t.c.muted, letterSpacing:'0.04em' }}>{word.source}</div>}
            </div>
            <div style={{ padding:'12px 18px 18px', textAlign:'center', color:t.c.muted, fontSize:13, borderTop:`0.5px solid ${t.c.line}` }}>
              לחץ לגלות
            </div>
          </div>

          {/* Back */}
          <div className="card-face card-back" style={{ background:t.c.surface2 || t.c.surface, borderRadius:22, border:`1px solid ${t.c.line}`, boxShadow: t.dark ? 'none' : '0 2px 0 rgba(20,20,40,0.04), 0 12px 40px -10px rgba(20,20,40,0.14)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px 20px 10px', gap:8, textAlign:'center', overflowY:'auto' }}>
              <div style={{ fontSize:11, fontWeight:700, color:t.accent, letterSpacing:'0.1em', direction:'ltr' }}>{word.en}</div>
              <div style={{ fontFamily:t.fontSerif, fontSize:28, fontWeight:500, color:t.c.ink, lineHeight:1.3, letterSpacing:'-0.005em' }}>
                {word.he}
              </div>
              {ai.assoc && <div style={{ marginTop:8, padding:'10px 14px', borderRadius:14, background: t.dark ? 'rgba(255,255,255,0.05)' : 'rgba(20,20,30,0.04)', border:`0.5px solid ${t.c.line}`, fontSize:13, color:t.c.ink2, lineHeight:1.55, direction:'rtl', textAlign:'right', maxWidth:'100%' }}>
                <div style={{ fontSize:10.5, fontWeight:700, color:t.c.muted, letterSpacing:'0.1em', marginBottom:5 }}>אסוציאציה</div>
                {ai.assoc}
              </div>}
              {ai.sentence && (() => {
                const parts = ai.sentence.split('|');
                return <div style={{ padding:'10px 14px', borderRadius:14, background: t.dark ? 'rgba(255,255,255,0.04)' : 'rgba(20,20,30,0.03)', border:`0.5px solid ${t.c.line}`, width:'100%', direction:'ltr', textAlign:'left' }}>
                  <div style={{ fontSize:10.5, fontWeight:700, color:t.c.muted, letterSpacing:'0.1em', marginBottom:5, direction:'rtl', textAlign:'right' }}>משפט לדוגמה</div>
                  <div style={{ fontFamily:t.fontSerif, fontSize:15, fontWeight:400, color:t.c.ink, lineHeight:1.55 }}>{parts[0]}</div>
                  {parts[1] && <div style={{ fontSize:13, color:t.c.muted, marginTop:5, direction:'rtl', textAlign:'right' }}>{parts[1]}</div>}
                </div>;
              })()}
            </div>
            {/* Swipe hint on first few cards */}
            {index < 3 && <div style={{ padding:'6px 0 8px', textAlign:'center', fontSize:11.5, color:t.c.muted }}>
              ← ← ללא יודע · יודע → →
            </div>}
          </div>
        </div>
      </div>
    </div>

    {/* Action buttons */}
    <div style={{ padding:`8px ${t.pad}px 12px`, flexShrink:0 }}>
      {!flipped ? (
        <PrimaryButton t={t} onClick={() => setFlipped(true)} style={{ width:'100%' }}>לחץ לגלות תרגום</PrimaryButton>
      ) : (
        <div style={{ display:'flex', gap:10 }}>
          <div onClick={() => mark('learning')} style={{ flex:1, height:56, borderRadius:20, background: t.dark ? 'rgba(255,140,140,0.12)' : 'oklch(0.96 0.04 20)', color:t.c.statusRose, display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontWeight:700, fontSize:15, cursor:'pointer', userSelect:'none' }}>
            <Icon name="x" size={16} color={t.c.statusRose} stroke={2.2}/>
            לא יודע
          </div>
          <div onClick={skip} style={{ width:56, height:56, borderRadius:20, background: t.dark ? 'rgba(255,255,255,0.07)' : 'rgba(20,20,30,0.05)', color:t.c.ink2, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
            <Icon name="skip" size={18} color={t.c.muted} stroke={1.7}/>
          </div>
          <div onClick={() => mark('known')} style={{ flex:2, height:56, borderRadius:20, background:t.accent, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontWeight:700, fontSize:15, cursor:'pointer', userSelect:'none', boxShadow:`0 6px 18px -6px ${t.accent}` }}>
            <Icon name="check" size={16} color="#fff" stroke={2.2}/>
            יודע
          </div>
        </div>
      )}
    </div>
  </div>;
}

function SessionDone({ t, stats, streak, onBack, onRestart }) {
  return <div className="screen-in" style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:t.pad, fontFamily:t.fontHe, gap:20 }}>
    <div style={{ fontSize:52 }}>🎉</div>
    <div style={{ textAlign:'center' }}>
      <div style={{ fontSize:24, fontWeight:700, color:t.c.ink, marginBottom:8 }}>סיימת!</div>
      <div style={{ fontSize:15, color:t.c.muted }}>מעולה, כל הכבוד.</div>
    </div>
    <Card t={t} style={{ width:'100%', maxWidth:320 }}>
      <div style={{ display:'flex', justifyContent:'space-around' }}>
        <StatBlock label="עברת" value={stats.reviewed} color={t.c.ink}/>
        <StatBlock label="יודע" value={stats.known} color={t.c.statusGreen}/>
        <StatBlock label="ללמידה" value={stats.learning} color={t.c.statusRose}/>
      </div>
      {streak > 0 && <div style={{ textAlign:'center', marginTop:14, fontSize:13, color:t.c.statusAmber, fontWeight:700 }}>
        <Icon name="flame" size={13} color={t.c.statusAmber} stroke={1.8}/> רצף: {streak} ימים
      </div>}
    </Card>
    <div style={{ display:'flex', gap:10, width:'100%', maxWidth:320 }}>
      <GhostButton t={t} onClick={onBack} style={{ flex:1 }}>בית</GhostButton>
      <PrimaryButton t={t} onClick={onRestart} style={{ flex:2 }}>תרגל שוב</PrimaryButton>
    </div>
  </div>;
}

function StatBlock({ label, value, color }) {
  return <div style={{ textAlign:'center' }}>
    <div style={{ fontSize:28, fontWeight:800, color, lineHeight:1 }}>{value}</div>
    <div style={{ fontSize:12, color:'#94a3b8', marginTop:4 }}>{label}</div>
  </div>;
}

// ─── Test Screen (Sentences + Restatements) ───────────────────
function TestScreen({ t, onBack }) {
  const [mode, setMode] = useState(null); // null | 'sc' | 'rs'
  const [qIndex, setQIndex] = useState(0);
  const [answered, setAnswered] = useState(null); // { chosen, correct, explanation }
  const [score, setScore] = useState({ right:0, wrong:0 });
  const [done, setDone] = useState(false);

  const questions = mode === 'sc' ? sentenceQuestions : mode === 'rs' ? restatementQuestions : [];
  const q = questions[qIndex];

  const answer = (chosen) => {
    if (answered) return;
    const isRight = chosen === q.correct;
    setAnswered({ chosen, correct: q.correct, explanation: q.explanation });
    setScore(s => ({ right: s.right + (isRight?1:0), wrong: s.wrong + (isRight?0:1) }));
  };

  const next = () => {
    setAnswered(null);
    if (qIndex < questions.length - 1) setQIndex(qIndex + 1);
    else setDone(true);
  };

  const reset = () => { setQIndex(0); setAnswered(null); setScore({right:0,wrong:0}); setDone(false); };

  if (!mode) return <div className="screen-in" style={{ padding:`16px ${t.pad}px`, fontFamily:t.fontHe }}>
    <div style={{ fontSize:22, fontWeight:700, color:t.c.ink, marginBottom:4 }}>מבחן</div>
    <div style={{ fontSize:14, color:t.c.muted, marginBottom:24 }}>בחר סוג תרגיל</div>
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      <Card t={t} style={{ cursor:'pointer' }} onClick={() => setMode('sc')}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ width:44, height:44, borderRadius:14, background:t.accentSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Icon name="list" size={22} color={t.accent} stroke={1.8}/></div>
          <div>
            <div style={{ fontSize:16, fontWeight:700, color:t.c.ink }}>השלמת משפטים</div>
            <div style={{ fontSize:13, color:t.c.muted }}>{sentenceQuestions.length} שאלות · 4 אפשרויות</div>
          </div>
          <Icon name="chevron-left" size={18} color={t.c.muted} style={{ marginRight:'auto' }}/>
        </div>
      </Card>
      <Card t={t} style={{ cursor:'pointer' }} onClick={() => setMode('rs')}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ width:44, height:44, borderRadius:14, background:t.accentSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Icon name="quote" size={22} color={t.accent} stroke={1.8}/></div>
          <div>
            <div style={{ fontSize:16, fontWeight:700, color:t.c.ink }}>ניסוח מחדש</div>
            <div style={{ fontSize:13, color:t.c.muted }}>{restatementQuestions.length} שאלות · 4 אפשרויות</div>
          </div>
          <Icon name="chevron-left" size={18} color={t.c.muted} style={{ marginRight:'auto' }}/>
        </div>
      </Card>
    </div>
  </div>;

  if (done) return <div className="screen-in" style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:t.pad, fontFamily:t.fontHe, gap:20 }}>
    <div style={{ fontSize:48 }}>✅</div>
    <div style={{ fontSize:22, fontWeight:700, color:t.c.ink }}>סיימת!</div>
    <Card t={t} style={{ width:'100%', maxWidth:300 }}>
      <div style={{ display:'flex', justifyContent:'space-around' }}>
        <StatBlock label="נכון" value={score.right} color={t.c.statusGreen}/>
        <StatBlock label="שגוי" value={score.wrong} color={t.c.statusRose}/>
        <StatBlock label="סה״כ" value={score.right+score.wrong} color={t.c.ink}/>
      </div>
    </Card>
    <div style={{ display:'flex', gap:10, width:'100%', maxWidth:300 }}>
      <GhostButton t={t} onClick={() => { reset(); setMode(null); }} style={{ flex:1 }}>תפריט</GhostButton>
      <PrimaryButton t={t} onClick={reset} style={{ flex:2 }}>שוב</PrimaryButton>
    </div>
  </div>;

  return <div className="screen-in" style={{ height:'100%', display:'flex', flexDirection:'column', fontFamily:t.fontHe }}>
    {/* Header */}
    <div style={{ padding:`12px ${t.pad}px 8px`, display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
      <div onClick={() => { reset(); setMode(null); }} style={{ width:36, height:36, borderRadius:18, background: t.dark ? 'rgba(255,255,255,0.08)' : 'rgba(20,20,30,0.06)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
        <Icon name="chevron-right" size={18} color={t.c.ink2} stroke={2}/>
      </div>
      <div style={{ flex:1 }}><ProgressBar t={t} value={(qIndex/questions.length)*100} height={4}/></div>
      <span style={{ fontSize:13, color:t.c.muted, fontFamily:t.fontEn }}>{qIndex+1}/{questions.length}</span>
      <span style={{ fontSize:13, color:t.c.statusGreen, fontWeight:700, fontFamily:t.fontEn }}>{score.right}</span>
    </div>

    {/* Question */}
    <div style={{ flex:1, overflow:'auto', padding:`8px ${t.pad}px` }}>
      <Card t={t} style={{ marginBottom:14 }}>
        <div style={{ fontFamily:t.fontSerif, fontSize:21, fontWeight:500, color:t.c.ink, lineHeight:1.6, direction:'ltr', textAlign:'left', letterSpacing:'-0.005em' }}>
          {q.q}
        </div>
      </Card>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {q.options.map((opt, i) => {
          let cls = 'quiz-opt';
          let bg = t.c.surface;
          let border = `1.5px solid ${t.c.line}`;
          let color = t.c.ink;
          if (answered) {
            if (i === answered.correct) { bg = 'oklch(0.55 0.13 150)'; border = 'none'; color = '#fff'; }
            else if (i === answered.chosen && i !== answered.correct) { bg = 'oklch(0.58 0.16 20)'; border = 'none'; color = '#fff'; }
          }
          return <div key={i} className={cls} onClick={() => answer(i)} style={{ padding:'16px 18px', borderRadius:16, background:bg, border, color, fontFamily:t.fontHe, fontSize:16, fontWeight:600, boxShadow: t.dark ? 'none' : '0 1px 0 rgba(20,20,40,0.025)', cursor:'pointer', direction:'ltr', textAlign:'left', transition:'0.15s' }}>
            <span style={{ color: answered && (i===answered.correct||i===answered.chosen) ? 'rgba(255,255,255,0.7)' : t.c.muted, fontSize:13, marginLeft:8 }}>{['A','B','C','D'][i]}.</span>
            {' '}{opt}
          </div>;
        })}
      </div>
      {answered && <div style={{ marginTop:14, padding:'14px 16px', borderRadius:16, background: t.dark ? 'rgba(255,255,255,0.05)' : 'rgba(20,20,30,0.04)', border:`0.5px solid ${t.c.line}` }}>
        <div style={{ fontSize:13, color:t.c.ink2, lineHeight:1.6, direction:'rtl', textAlign:'right' }}>{answered.explanation}</div>
      </div>}
    </div>

    {/* Next button */}
    {answered && <div style={{ padding:`8px ${t.pad}px 12px`, flexShrink:0 }}>
      <PrimaryButton t={t} onClick={next} style={{ width:'100%' }}>
        {qIndex < questions.length - 1 ? 'שאלה הבאה' : 'סיים'}
        <Icon name="chevron-left" size={16} color="#fff" stroke={2.2}/>
      </PrimaryButton>
    </div>}
  </div>;
}

// ─── Profile / Settings Screen ────────────────────────────────
function ProfileScreen({ t, isDark, onToggleDark, stats, streak, progress, allWords }) {
  const [showReset, setShowReset] = useState(false);
  const lastSession = useMemo(() => { try { return JSON.parse(localStorage.getItem('lastSession')||'null'); } catch { return null; } }, []);

  const handleReset = () => {
    if (confirm('למחוק את כל נתוני ההתקדמות? הפעולה אינה הפיכה.')) {
      localStorage.removeItem('vocabProgress');
      localStorage.removeItem('vocabStreak');
      localStorage.removeItem('dailyStats');
      localStorage.removeItem('lastSession');
      window.location.reload();
    }
  };

  return <div className="screen-in" style={{ padding:`16px ${t.pad}px 0`, fontFamily:t.fontHe }}>
    <div style={{ fontSize:24, fontWeight:700, color:t.c.ink, marginBottom:18 }}>פרופיל</div>

    {/* Stats summary */}
    <Card t={t} style={{ marginBottom:14 }}>
      <div style={{ display:'flex', justifyContent:'space-around' }}>
        <StatBlock label="יודע" value={stats.known} color={t.c.statusGreen}/>
        <StatBlock label="ללמידה" value={stats.learning} color={t.accent}/>
        <StatBlock label="טרם" value={stats.unseen} color={t.c.muted}/>
      </div>
      <div style={{ height:0.5, background:t.c.line, margin:'14px 0 12px' }}/>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
        <Icon name="flame" size={16} color={t.c.statusAmber} stroke={1.8}/>
        <span style={{ fontSize:15, fontWeight:700, color:t.c.statusAmber }}>רצף {streak} ימים</span>
      </div>
    </Card>

    {/* Settings */}
    <div style={{ fontSize:11.5, fontWeight:700, letterSpacing:'0.12em', color:t.c.muted, textTransform:'uppercase', padding:'0 4px 10px' }}>הגדרות</div>
    <Card t={t} pad={0} style={{ marginBottom:14, overflow:'hidden' }}>
      <SettingRow t={t} label="מצב לילה" sub="צבעים כהים">
        <Toggle t={t} on={isDark} onToggle={onToggleDark}/>
      </SettingRow>
    </Card>

    {/* Last session */}
    {lastSession && <Card t={t} style={{ marginBottom:14 }}>
      <div style={{ fontSize:13, fontWeight:700, color:t.c.muted, marginBottom:10 }}>הסשן האחרון</div>
      <div style={{ display:'flex', justifyContent:'space-between' }}>
        <span style={{ fontSize:13, color:t.c.ink2 }}>עברתי</span>
        <span style={{ fontSize:13, fontWeight:700, color:t.c.ink }}>{lastSession.reviewed||0} מילים</span>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
        <span style={{ fontSize:13, color:t.c.ink2 }}>סימנתי יודע</span>
        <span style={{ fontSize:13, fontWeight:700, color:t.c.statusGreen }}>{lastSession.markedKnown||0} מילים</span>
      </div>
    </Card>}

    {/* Danger */}
    <div style={{ marginBottom:24 }}>
      <GhostButton t={t} onClick={handleReset} style={{ width:'100%', color:'oklch(0.58 0.16 20)' }}>
        <Icon name="trash" size={16} color="oklch(0.58 0.16 20)"/>
        אפס נתוני התקדמות
      </GhostButton>
    </div>
  </div>;
}

function SettingRow({ t, label, sub, children }) {
  return <div style={{ display:'flex', alignItems:'center', padding:'14px 18px', gap:12 }}>
    <div style={{ flex:1 }}>
      <div style={{ fontSize:15, fontWeight:600, color:t.c.ink }}>{label}</div>
      {sub && <div style={{ fontSize:12, color:t.c.muted, marginTop:2 }}>{sub}</div>}
    </div>
    {children}
  </div>;
}

function Toggle({ t, on, onToggle }) {
  return <div onClick={onToggle} style={{ width:48, height:28, borderRadius:14, background: on ? t.accent : (t.dark ? 'rgba(255,255,255,0.15)' : 'rgba(20,20,30,0.12)'), position:'relative', cursor:'pointer', transition:'background 0.2s', flexShrink:0 }}>
    <div style={{ position:'absolute', top:3, left: on ? 23 : 3, width:22, height:22, borderRadius:11, background:'#fff', boxShadow:'0 1px 4px rgba(0,0,0,0.25)', transition:'left 0.2s' }}/>
  </div>;
}

// ─── App Root ────────────────────────────────────────────────
function App() {
  const [isDark, setIsDark] = useState(() => localStorage.getItem('darkMode') === 'true');
  const [screen, setScreen] = useState('home');
  const [progress, setProgress] = useState(() => {
    try { const p = JSON.parse(localStorage.getItem('vocabProgress') || '{}');
      // migrate old format
      for (const k in p) { if (p[k].known === true) { p[k].status='known'; delete p[k].known; } else if (p[k].known === false) { p[k].status='learning'; delete p[k].known; } }
      return p;
    } catch { return {}; }
  });
  const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('vocabStreak') || '0'));
  const [aiData, setAiData] = useState({});
  const [flashList, setFlashList] = useState([]);

  const t = makeTokens({ palette:'ink', dark:isDark });

  useEffect(() => {
    document.body.style.background = t.c.bg;
    fetch('./ai_completed_data.json').then(r => r.json()).then(setAiData).catch(() => {});
    // Splash
    const splash = document.getElementById('splash');
    if (splash) {
      const delay = localStorage.getItem('isFirstLoadComplete_V2') ? 500 : 1600;
      setTimeout(() => { splash.style.opacity='0'; setTimeout(() => splash.style.display='none', 600); }, delay);
      localStorage.setItem('isFirstLoadComplete_V2','true');
    }
  }, []);

  const allWords = useMemo(() => {
    const map = new Map();
    rawData.forEach(item => {
      const p = item.split('|');
      if (p.length >= 4) map.set(p[0].toLowerCase()+'_Kidum', { en:p[0], he:p[1], level:p[2], unit:p[3], source:'Kidum' });
    });
    try { JSON.parse(localStorage.getItem('customVocab')||'[]').forEach(cw => { const src=cw.source||'Custom'; map.set(cw.en.toLowerCase()+'_'+src, cw); }); } catch {}
    return Array.from(map.values());
  }, []);

  const stats = useMemo(() => {
    let known=0, learning=0;
    allWords.forEach(w => { const s=(progress[w.en]&&progress[w.en].status)||'unseen'; if(s==='known')known++; else if(s==='learning')learning++; });
    return { known, learning, unseen:allWords.length-known-learning, total:allWords.length };
  }, [allWords, progress]);

  const saveProgress = useCallback((newProg, newStreak) => {
    localStorage.setItem('vocabProgress', JSON.stringify(newProg));
    if (newStreak !== undefined) { localStorage.setItem('vocabStreak', String(newStreak)); setStreak(newStreak); }
    setProgress({...newProg});
  }, []);

  const startFlash = useCallback((list) => {
    if (!list || list.length === 0) return;
    setFlashList(list);
    setScreen('flashcard');
  }, []);

  const handleNav = useCallback((tab) => {
    if (tab === 'home') setScreen('home');
    else if (tab === 'practice') {
      const now = Date.now();
      const learning = allWords.filter(w => progress[w.en]?.status === 'learning');
      const due = allWords.filter(w => { const p=progress[w.en]; return p&&p.status==='known'&&(p.nextReview||0)<=now; });
      const unseen = allWords.filter(w => !progress[w.en]||progress[w.en].status==='unseen');
      const list = [...shuffle(learning), ...shuffle(due), ...shuffle(unseen)].slice(0, 40);
      startFlash(list.length > 0 ? list : shuffle(allWords).slice(0,20));
    }
    else if (tab === 'test') setScreen('test');
    else if (tab === 'profile') setScreen('profile');
  }, [allWords, progress, startFlash]);

  const toggleDark = useCallback(() => { const d=!isDark; setIsDark(d); localStorage.setItem('darkMode',String(d)); }, [isDark]);

  const activeTab = screen === 'flashcard' ? 'practice' : screen === 'test' ? 'test' : screen === 'profile' ? 'profile' : 'home';

  return <div dir="rtl" style={{ position:'fixed', inset:0, background:t.c.bg, fontFamily:t.fontHe, color:t.c.ink, display:'flex', flexDirection:'column', overflow:'hidden' }}>
    <div style={{ flex:1, overflow:'auto', paddingBottom:72 }}>
      {screen === 'home' && <HomeScreen t={t} allWords={allWords} progress={progress} stats={stats} streak={streak} onStartFlash={startFlash} onNavigate={setScreen}/>}
      {screen === 'flashcard' && <FlashcardScreen t={t} list={flashList} progress={progress} streak={streak} aiData={aiData} saveProgress={saveProgress} onBack={() => setScreen('home')}/>}
      {screen === 'test' && <TestScreen t={t} onBack={() => setScreen('home')}/>}
      {screen === 'profile' && <ProfileScreen t={t} isDark={isDark} onToggleDark={toggleDark} stats={stats} streak={streak} progress={progress} allWords={allWords}/>}
    </div>
    <BottomTabBar t={t} active={activeTab} onNav={handleNav}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
